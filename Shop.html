<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Мини‑магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 16px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .product { border: 1px solid var(--tg-theme-hint-color); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Наши товары</h1>
    <div id="products"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // растягиваем на весь экран

        const products = [
            { id: 1, name: 'Футболка', price: 150000 },
            { id: 2, name: 'Кепка', price: 80000 },
            { id: 3, name: 'Кружка', price: 40000 }
        ];

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '';
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `
                    <strong>${p.name}</strong><br>
                    Цена: ${p.price} сум<br>
                    <button onclick="buy(${p.id})">Купить</button>
                `;
                container.appendChild(div);
            });
        }

        window.buy = function(productId) {
            const product = products.find(p => p.id === productId);
            tg.sendData(JSON.stringify({
                action: 'buy',
                product: product
            }));
        };

        renderProducts();
    </script>
</body>
</html>
